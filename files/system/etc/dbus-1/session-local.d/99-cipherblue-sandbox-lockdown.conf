<?xml version="1.0"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- 
    CIPHERBLUE ZERO-TRUST IPC ENGINE
    Mathematically severs the flatpak-spawn --host escape hatch globally.
    Even if an app is granted org.freedesktop.Flatpak permissions, the D-Bus
    broker will refuse to route the HostCommand payload.
  -->
  <policy context="default">
    <deny send_destination="org.freedesktop.Flatpak" send_interface="org.freedesktop.Flatpak.Development"/>
  </policy>
</busconfig>