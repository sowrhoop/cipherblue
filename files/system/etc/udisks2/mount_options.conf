# Cipherblue External Hardware Lockdown
# Forces ALL dynamically mounted external drives to be non-executable

[defaults]
# The global baseline for all unidentified filesystems
defaults=nosuid,nodev,noexec

# Explicit enforcement for common USB/External formats to override any fallback behaviors
vfat_defaults=uid=$UID,gid=$GID,shortname=mixed,utf8=1,showexec,flush,nosuid,nodev,noexec
exfat_defaults=uid=$UID,gid=$GID,iocharset=utf8,errors=remount-ro,nosuid,nodev,noexec
ntfs_defaults=uid=$UID,gid=$GID,windows_names,nosuid,nodev,noexec
ext4_defaults=nosuid,nodev,noexec
btrfs_defaults=nosuid,nodev,noexec

# Prevent users from passing custom mount flags via the GUI or CLI to bypass the above
allow=nosuid,nodev,noexec