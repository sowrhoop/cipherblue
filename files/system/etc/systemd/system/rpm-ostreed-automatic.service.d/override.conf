[Unit]
Wants=network-online.target
After=network-online.target
StartLimitIntervalSec=24h
StartLimitBurst=3

[Service]
ExecCondition=/bin/bash -c '[[ "$(busctl get-property org.freedesktop.NetworkManager /org/freedesktop/NetworkManager org.freedesktop.NetworkManager Metered | cut -c 3-)" == @(2|4) ]]'
ExecStartPre=/usr/libexec/cipherblue/verify-provenance.sh

# FIX: Removed Restart directives. 
# This service is triggered by your aggressive timer. If it fails, the timer will natively wake it up again.