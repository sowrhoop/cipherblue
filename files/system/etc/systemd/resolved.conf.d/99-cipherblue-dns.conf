[Resolve]
# CipherBlue: opinionated systemd-resolved configuration that routes all
# lookups through Mullvad's ad/tracker/malware blocking resolvers.
#
# Notes / rationale:
# - DNS= lines include "#<name>" to pin the TLS/hostname used for DNS-over-TLS.
# - Domains=~. instructs resolved to route all lookups to the configured servers.
#   This may override per-link DNS settings; remove or adapt if you need split DNS.
# - DNSOverTLS=yes enforces TLS for queries. If you encounter networks that block
#   DNS-over-TLS, consider `DNSOverTLS=opportunistic` instead to fall back to
#   plaintext (trade-off: privacy vs. connectivity).
# - DNSSEC is intentionally left disabled to avoid breaking connectivity on
#   networks where DNSSEC validation fails; enable it when you can rely on
#   validated upstream servers.
#
# Mullvad Ad/Tracker/Malware Blocking DNS (both IPv4 and IPv6) — single line
# with hostname pinning for TLS validation:
DNS=194.242.2.9#all.dns.mullvad.net 2a07:e340::9#all.dns.mullvad.net

# Enforce DNS-over-TLS (use 'opportunistic' if strict TLS causes connectivity issues)
DNSOverTLS=opportunistic

# DNSSEC: intentionally not enabled by default because it may break networks
# with absent/invalid DNSSEC. If you require DNSSEC validation, set to 'yes'
# or try 'allow-downgrade' depending on your systemd version and needs.
#DNSSEC=yes

# Caching: set to 'no' to avoid local caching (privacy/freshness); set to 'yes'
# to improve latency and reduce upstream queries. Keep as-is to respect the
# original choice.
Cache=no
StaleRetentionSec=0

# Respect /etc/hosts
ReadEtcHosts=yes

# Disable local name-resolution discovery protocols to reduce information leakage
MulticastDNS=no
LLMNR=no

# Explicitly avoid providing fallback DNS servers. Leaving FallbackDNS empty
# prevents automatic fallbacks to public resolvers; set if you want a safe fallback.
FallbackDNS=

# Route all domains through the configured DNS servers (default route).
Domains=~.
