# Framebuffer drivers are generally buggy and poorly-supported, and cause
# suspend failures, kernel panics and general mayhem.  For this reason we
# never load them automatically.

# The commented modules were present upstream, but were already blacklisted by
# Fedora.

#blacklist aty128fb
#blacklist atyfb
#blacklist radeonfb
#blacklist cirrusfb
blacklist cyber2000fb
blacklist cyblafb
blacklist gx1fb
blacklist hgafb
#blacklist i810fb
#blacklist intelfb
#blacklist kyrofb
blacklist lxfb
blacklist matroxfb_base
blacklist neofb
#blacklist nvidiafb
blacklist pm2fb
#blacklist rivafb
blacklist s1d13xxxfb
#blacklist savagefb
blacklist sisfb
#blacklist sstfb
#blacklist tdfxfb
#blacklist tridentfb
blacklist vesafb
blacklist vfb
#blacklist viafb
blacklist vt8623fb
blacklist udlfb
