name: cipherblue-build

on:
  schedule:
    - cron: "00 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Cipherblue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe-cipherblue.yml
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Cipherblue Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: false
          squash: true
          verify_install: true
          retry_push_count: 3
        secrets:
          # Expose secrets strictly for the BlueBuild secure runner
          CIPHERBLUE_BLOCKLIST: ${{ secrets.CIPHERBLUE_BLOCKLIST }}
          CIPHERBLUE_FLATPAKS: ${{ secrets.CIPHERBLUE_FLATPAKS }}