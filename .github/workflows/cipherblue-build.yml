name: cipherblue-build

on:
  schedule:
    - cron: "00 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Cipherblue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe-cipherblue.yml
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Shift-Left Secret Injection
        env:
          HOSTS_BLOCKLIST: ${{ secrets.CIPHERBLUE_BLOCKLIST }}
          FLATPAK_WHITELIST: ${{ secrets.CIPHERBLUE_FLATPAKS }}
        run: |
          echo "CIPHERBLUE: Pre-computing immutable state on GitHub Runner..."
          
          # 1. Format and inject Flatpak Whitelist
          # Converts the comma-separated secret into a clean newline-separated string
          FORMATTED_FLATPAKS=$(echo "$FLATPAK_WHITELIST" | tr ',' '\n' | tr -d ' ' | grep -v '^$')
          export FORMATTED_FLATPAKS
          perl -0777 -pi -e 's/__SECRET_FLATPAK_WHITELIST__/$ENV{FORMATTED_FLATPAKS}/g' files/system/etc/cipherblue/flatpaks.list
          
          # 2. Inject Hosts Blocklist safely
          perl -0777 -pi -e 's/__SECRET_HOSTS_BLOCKLIST__/$ENV{HOSTS_BLOCKLIST}/g' files/system/etc/cipherblue/hosts.blocklist
          
          echo "CIPHERBLUE: Secrets mathematically hardcoded into static repository files."

      - name: Build Cipherblue Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: false
          squash: true