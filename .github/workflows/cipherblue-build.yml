name: cipherblue-build

on:
  schedule:
    - cron: "00 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Cipherblue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe-cipherblue.yml
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Sandbox Secret Injection
        env:
          HOSTS_BLOCKLIST: ${{ secrets.CIPHERBLUE_BLOCKLIST }}
          FLATPAK_WHITELIST: ${{ secrets.CIPHERBLUE_FLATPAKS }}
        run: |
          echo "CIPHERBLUE: Isolating secrets from container build environment..."
          
          # 1. Inject the Flatpak list (Single line, safe for sed)
          sed -i "s|__SECRET_FLATPAK_WHITELIST__|${FLATPAK_WHITELIST}|g" files/scripts/cipherblue-private.sh
          
          # 2. Inject the Hosts Blocklist (Multi-line, handled via secure Perl stream)
          # This guarantees zero escaping errors, regardless of what is in your secret!
          perl -0777 -pi -e 's/__SECRET_HOSTS_BLOCKLIST__/$ENV{HOSTS_BLOCKLIST}/g' files/scripts/cipherblue-private.sh
          
          chmod +x files/scripts/cipherblue-private.sh
          echo "CIPHERBLUE: Secrets mathematically hardcoded into execution script."

      - name: Build Cipherblue Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: false
          squash: true
          verify_install: true
          retry_push_count: 3