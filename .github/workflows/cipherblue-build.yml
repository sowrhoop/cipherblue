name: cipherblue-build

on:
  schedule:
    - cron: "00 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Cipherblue
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe-cipherblue.yml
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Immutable State Generation (Violent Overwrite)
        env:
          HOSTS_BLOCKLIST: ${{ secrets.CIPHERBLUE_BLOCKLIST }}
          FLATPAK_WHITELIST: ${{ secrets.CIPHERBLUE_FLATPAKS }}
        run: |
          echo "CIPHERBLUE: Pre-computing immutable state on GitHub Runner..."
          mkdir -p files/system/etc/cipherblue
          
          # 1. VIOLENT PURGE: Annihilate any placeholders tracked by Git
          rm -f files/system/etc/cipherblue/flatpaks.list
          rm -f files/system/etc/cipherblue/hosts.blocklist
          
          # 2. PURE GENERATION: Flatpak Vault
          if [[ -n "$FLATPAK_WHITELIST" ]]; then
            echo "$FLATPAK_WHITELIST" | tr ',' '\n' | tr -d ' ' | grep -v '^$' > files/system/etc/cipherblue/flatpaks.list
            echo "Flatpak vault generated from secrets."
          else
            # Because we deleted the file above, touch now safely creates a 0-byte file
            touch files/system/etc/cipherblue/flatpaks.list
            echo "Warning: Flatpak secret empty. Generating 0-byte vault."
          fi
          
          # 3. PURE GENERATION: Domain Blocklist
          if [[ -n "$HOSTS_BLOCKLIST" ]]; then
            echo "$HOSTS_BLOCKLIST" > files/system/etc/cipherblue/hosts.blocklist
            echo "Domain blocklist generated from secrets."
          else
            touch files/system/etc/cipherblue/hosts.blocklist
            echo "Warning: Blocklist secret empty. Generating 0-byte blocklist."
          fi
          
          # 4. Lock Permissions for OSTree blueprint
          chmod 644 files/system/etc/cipherblue/flatpaks.list
          chmod 644 files/system/etc/cipherblue/hosts.blocklist

      - name: Build Cipherblue Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: false
          squash: true