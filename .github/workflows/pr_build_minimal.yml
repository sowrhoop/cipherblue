name: pr-build-minimal

permissions: {}

on:
  pull_request:
    branches:
      - live
      - staging
    paths-ignore:
      - "**.md"

# Cancels running workflows if a new workflow run for
# the same workflow is started
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: PR build (general/recipe-silverblue-main.yml)
    permissions:
      contents: read
    uses: ./.github/workflows/pr_build.yml
    with:
      recipe: general/recipe-silverblue-main.yml
