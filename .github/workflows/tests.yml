name: run-tests
permissions: {}
on:
  pull_request:
    branches:
      - live
      - staging
    paths-ignore:
      - "**.md"
  workflow_dispatch: # allow manually triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run_tests:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    name: Install Bats and run tests
    steps:
      - name: Checkout repo
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Setup Bats and bats libs
        id: setup-bats
        uses: bats-core/bats-action@42fcc8700f773c075a16a90eb11674c0318ad507 #v3.0.1
        with:
           support-path: "${{ github.workspace }}/.bats/bats-support"
           assert-path: "${{ github.workspace }}/.bats/bats-assert"
           detik-path: "${{ github.workspace }}/.bats/bats-detik"
           file-path: "${{ github.workspace }}/.bats/bats-file"

      - name: Install just
        env:
          OS_ARCH: x86_64
        run: |
          sudo --preserve-env=OS_ARCH bash files/scripts/manuallyinstalljust.sh

      - name: Run tests
        shell: bash
        env:
          INSTALL_SCRIPT: files/system/usr/share/secureblue/install_secureblue.sh
          BATS_LIB_PATH: "${{ github.workspace }}/.bats"
        run: |
          bats --timing --trace --verbose-run -r .github/workflows/tests
