name: Cleanup Old Images
permissions: {}
on:
  schedule:
    - cron: "15 0 * * 0" # 0015 UTC on Sundays
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}

jobs:
  delete-older-than-90:
    name: Delete images older than 90 days
    runs-on: ubuntu-24.04
    if: github.triggering_actor == 'sowrhoop' || github.event_name == 'schedule'
    permissions:
      packages: write # delete old images
    steps:
      - name: Delete Images Older Than 7 Days
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          packages: cipherblue
          older-than: 7 days
          delete-orphaned-images: true
          keep-n-tagged: 7
          keep-n-untagged: 7
