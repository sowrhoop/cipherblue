name: Cleanup Old Images
permissions: {}
on:
  schedule:
    - cron: "15 0 * * 0" # 0015 UTC on Sundays
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}

jobs:
  delete-older-than-90:
    runs-on: ubuntu-24.04
    if: github.triggering_actor == 'royaloughtness' || ${{ github.event_name == 'schedule' }}
    permissions:
      packages: write
    steps:
      - name: Delete Images Older Than 90 Days
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          packages: silverblue-main-hardened,silverblue-nvidia-hardened,silverblue-nvidia-open-hardened,kinoite-main-hardened,kinoite-nvidia-hardened,kinoite-nvidia-open-hardened,sericea-main-hardened,sericea-nvidia-hardened,sericea-nvidia-open-hardened,securecore-main-hardened,securecore-nvidia-hardened,securecore-nvidia-open-hardened,securecore-zfs-main-hardened,securecore-zfs-nvidia-hardened,securecore-zfs-nvidia-open-hardened,cosmic-main-hardened,cosmic-nvidia-hardened,cosmic-nvidia-open-hardened
          older-than: 90 days
          delete-orphaned-images: true
          keep-n-tagged: 7
          keep-n-untagged: 7
