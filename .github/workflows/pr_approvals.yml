name: PR Approvals

permissions: {}

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-approvals:
    name: PR Approvals
    runs-on: ubuntu-24.04 
    permissions:
      contents: read
    env:
      approvers:
    steps:
      - uses: secureblue/approvals-action@cf33051e1d3a2137da849e42cfd8a7d3609d3b30 # v0.2.5
        id: approvers
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          min-required: 2
          skip-dependabot: true
          approvers: |
            EsseLowNitro
            fiftydinar
            RoyalOughtness
            mintpilo
            mkkvcs
            RKNF404
            Rubiginosa
            ShadowSlayer1441
            spaceoden
            TheHooly
            WavyEbuilder
            HastD
            pxlkng
            alexvojproc
