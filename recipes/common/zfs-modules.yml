modules:
  - type: script
    source: ghcr.io/blue-build/modules@sha256:50747361c625c0a5afac314f174243ca7d14373dbbdd20e2261c1f9384a632de
    scripts:
      - installzfskmod.sh
    secrets:
      - type: env
        name: KERNEL_PRIVKEY
        mount:
          type: file
          destination: /tmp/certs/private_key.priv
