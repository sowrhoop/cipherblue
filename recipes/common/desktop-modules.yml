modules:
    - type: files
      files:
        - source: system/desktop
          destination: /
    - from-file: common/desktop-packages.yml
    - from-file: common/desktop-scripts.yml
    - type: dnf
      repos:
        files:
        - https://copr.fedorainfracloud.org/coprs/secureblue/trivalent/repo/fedora-%OS_VERSION%/secureblue-trivalent-fedora-%OS_VERSION%.repo
      install:
        packages:
          - trivalent-subresource-filter
    - type: justfiles
      validate: true
      include:
        - desktop
    - type: brew
      brew-analytics: false
      direct-pull: true
      installer-commit: 39c012e6db58f84f7469e9346adba57f8302110b
