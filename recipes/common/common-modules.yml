modules:
    - type: script
      source: ghcr.io/blue-build/modules@sha256:3c04c323f281bdb1ab88148a2335608344bcc07c6c4d2f5f777063a16554256d
      scripts:
        - addrepos.sh
        - httpsmirrors.sh
        - unprotectsudo.sh
    - from-file: common/common-packages.yml
    - type: files
      source: ghcr.io/blue-build/modules@sha256:3c04c323f281bdb1ab88148a2335608344bcc07c6c4d2f5f777063a16554256d
      files:
        - source: system/usr
          destination: /usr
        - source: system/etc
          destination: /etc
    - from-file: common/common-scripts.yml
    - type: script
      source: ghcr.io/blue-build/modules@sha256:3c04c323f281bdb1ab88148a2335608344bcc07c6c4d2f5f777063a16554256d
      scripts:
        - signkernel.sh
      secrets:
        - type: env
          name: KERNEL_PRIVKEY
          mount:
            type: file
            destination: /tmp/certs/private_key.priv
    - type: secureblue-signing
      source: local
