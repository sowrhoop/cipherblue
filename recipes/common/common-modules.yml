modules:
    - type: script
      scripts:
        - createautostartdir.sh
        - httpsmirrors.sh
        - unprotectsudo.sh
    - from-file: common/common-packages.yml
    - type: script
      scripts:
        - manuallyinstalljust.sh
        - hardenlogindefs.sh
        - hardened_malloc-pam.sh
        - disableresolved.sh
        - setup-dnsconfd.sh
    - type: files
      files:
        - source: system/usr
          destination: /usr
        - source: system/etc
          destination: /etc
    - type: justfiles
      validate: true
      include:
        - common
    - from-file: common/common-scripts.yml
    - type: script
      scripts:
        - signkernel.sh
      secrets:
        - type: env
          name: KERNEL_PRIVKEY
          mount:
            type: file
            destination: /tmp/certs/private_key.priv
    - type: secureblue-signing
      source: local
