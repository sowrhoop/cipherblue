modules:
    - type: dnf
      source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
      install:
        install-weak-deps: false
        packages:
          - gnome-disk-utility
          - adw-gtk3-theme
          - gnome-tweaks
      remove:
        packages:
          - gnome-shell-extension-background-logo
          - gnome-tour
          - yelp
          - gnome-user-share
          - mod_lua
          - httpd
          - httpd-core
          - mod_http2
          - mod_dnssd
          - gnome-remote-desktop
          - libvncserver
          - fedora-chromium-config-gnome
          - gnome-software
          - epiphany-runtime
          - totem-video-thumbnailer
          - fedora-flathub-remote
          - fedora-third-party
          - fedora-workstation-repositories
    - type: gschema-overrides
      source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
      include:
        - zz1-cipherblue.gschema.override
    - type: script
      source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
      scripts:
        - removedkmshelper.sh
    - type: files
      source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
      files:
        - source: system/silverblue
          destination: /
    - type: justfiles
      source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
      validate: true
      include:
        - silverblue.just
