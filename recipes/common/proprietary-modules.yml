modules:
    - type: script
      scripts:
        - installproprietarypackages.sh
    - type: rpm-ostree
      install:
      - heif-pixbuf-loader
      - ffmpeg
      - ffmpeg-libs
      - ffmpegthumbnailer
      - pipewire-libs-extra
      - libfdk-aac
      - gstreamer1-plugins-ugly  
      - gstreamer1-plugins-bad
      remove:
      - gstreamer1-plugins-ugly-free
      - gstreamer1-plugins-bad-free
      - gstreamer1-plugins-bad-free-libs
      - fdk-aac-free
      - ffmpeg-free
      - libavcodec-free  
      - libavdevice-free
      - libavfilter-free
      - libavformat-free  
      - libavutil-free  
      - libpostproc-free  
      - libswresample-free  
      - libswscale-free  
    - type: script
      scripts:
        - removeunusedrepos.sh
