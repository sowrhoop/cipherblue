type: dnf
install:
  install-weak-deps: false
  packages:
    - headsetcontrol
    - mediainfo
    - bubblejail
    - usbguard-notifier
    - usbguard
    - setools
    - fscrypt
    - vim
    - wl-clipboard
    - alsa-firmware
    - fzf

    # yubikey enablement
    - pam-u2f
    - pam_yubico
    - pamu2fcfg
    - yubikey-manager

    # ensure universal font coverage
    - google-noto-fonts-all
remove:
  packages:
    - firefox
    - firefox-langpacks
    - fuse
    - passim
    - fedora-chromium-config
replace:
  - from-repo: copr.fedorainfracloud.org:secureblue:branding
    packages:
      - old: fedora-logos
        new: secureblue-logos
  - from-repo: fedora
    packages:
      - old: OpenCL-ICD-Loader
        new: ocl-icd
