type: dnf
source: ghcr.io/blue-build/modules@sha256:3c04c323f281bdb1ab88148a2335608344bcc07c6c4d2f5f777063a16554256d
install:
  install-weak-deps: false
  packages:
    - hardened_malloc
    - dnsconfd-unbound

    # missing upstream
    - openssl
    - patch
    - nvme-cli
    - hdparm
    - gettext
    - rsync

    # signing deps
    - sbsigntools

    # address hardened_malloc incompatibilities
    - no_rlimit_as

    # provenance deps
    - crane
    - slsa-verifier
