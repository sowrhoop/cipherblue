type: dnf
source: ghcr.io/blue-build/modules@sha256:3c04c323f281bdb1ab88148a2335608344bcc07c6c4d2f5f777063a16554256d
install:
  install-weak-deps: false
  packages:
    - hardened_malloc
    - run0edit
    - dnsconfd-unbound

    # missing upstream
    - openssl
    - patch
    - 7zip-standalone-all
    - 7zip
    - distrobox
    - toolbox
    - podman
    - nvme-cli
    - hdparm
    - wireguard-tools
    - gettext
    - rsync
    - steam-devices

    # signing deps
    - sbsigntools

    # address hardened_malloc incompatibilities
    - no_rlimit_as

    # For use in unprivileged ujust scripts
    - python3-inquirer

    # provenance deps
    - crane
    - slsa-verifier