type: dnf
source: ghcr.io/blue-build/modules@sha256:50747361c625c0a5afac314f174243ca7d14373dbbdd20e2261c1f9384a632de
install:
  install-weak-deps: false
  packages:
    - hardened_malloc
    - run0edit
    - dnsconfd-unbound

    # missing upstream
    - openssl
    - patch
    - p7zip
    - distrobox
    - toolbox
    - podman
    - nvme-cli
    - hdparm
    - wireguard-tools
    - gettext
    - rsync
    - steam-devices

    # signing deps
    - sbsigntools

    # address hardened_malloc incompatibilities
    - no_rlimit_as

    # For use in unprivileged ujust scripts
    - python3-inquirer

    # provenance deps
    - crane
    - slsa-verifier
