modules:
  - type: justfiles
    source: ghcr.io/blue-build/modules@sha256:c91331a9e9a418bc84817d15d0a8e1bc1c58ad1571f9efbc4625b84d5dbc2246
    validate: true
    include:
      - nvidia
  - type: script
    source: ghcr.io/blue-build/modules@sha256:c91331a9e9a418bc84817d15d0a8e1bc1c58ad1571f9efbc4625b84d5dbc2246
    scripts:
      - installnvidiakmod.sh
    secrets:
      - type: env
        name: KERNEL_PRIVKEY
        mount:
          type: file
          destination: /tmp/certs/private_key.priv
  - type: script
    source: ghcr.io/blue-build/modules@sha256:c91331a9e9a418bc84817d15d0a8e1bc1c58ad1571f9efbc4625b84d5dbc2246
    scripts:
      - installnvidiapackages.sh
      - removeunusedrepos.sh
      - setearlyloading.sh
      - setdrmvariables.sh
  - type: files
    source: ghcr.io/blue-build/modules@sha256:c91331a9e9a418bc84817d15d0a8e1bc1c58ad1571f9efbc4625b84d5dbc2246
    files:
      - source: system/nvidia
        destination: /
