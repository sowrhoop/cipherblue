        ##- distrobox
        ##- toolbox
        ##- podman
        ##- nvme-cli
        ##- hdparm
        ##- wireguard-tools
        ##- gettext
        ##- rsync
        ##- steam-devices

        # signing deps
        - sbsigntools

        # address hardened_malloc incompatibilities
        - no_rlimit_as

        # For use in unprivileged ujust scripts
        ##- python3-inquirer

        # provenance deps
        - crane
        - slsa-verifier

  - type: script
