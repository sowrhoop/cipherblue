name: cipherblue

description: "Hardened Minimal Silverblue Image"

base-image: quay.io/fedora/fedora-silverblue

image-version: latest

cosign-version: none
nushell-version: none

platforms:
  - linux/amd64

modules:
  # Core common scripts, repo setup, and hardening
  - type: script
    source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
    scripts:
      # - addrepos.sh  # removed: script not present
      # - createautostartdir.sh  # removed: script not present
      - httpsmirrors.sh
      - unprotectsudo.sh
      - check-rpm-ostree-version.sh

  - type: files
    source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
    files:
      - source: system/usr
        destination: /usr
      - source: system/etc
        destination: /etc

  # ============================================================================
  # CIPHERBLUE NATIVE SECRETS INJECTION
  # Safely mounts secrets to RAM (/run/secrets) strictly during execution.
  # ============================================================================
  - type: script
    source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
    secrets:
      - type: env
        name: HOSTS_BLOCKLIST
      - type: env
        name: FLATPAK_WHITELIST
    scripts:
      - cipherblue-private.sh
        
  - type: dnf
    source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
    install:
      install-weak-deps: false
      packages:
        - hardened_malloc
        ##- run0edit
        # - dnsconfd-unbound (removed: switching to systemd-resolved)

        # missing upstream
        - openssl
        - patch
        ##- 7zip-standalone-all
