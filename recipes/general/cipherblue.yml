name: cipherblue

description: "Silverblue with nvidia-open, hardened"

base-image: quay.io/fedora/fedora-silverblue

image-version: latest

cosign-version: none
nushell-version: none

platforms:
  - linux/amd64

modules:
  - from-file: common/common-modules.yml
  - from-file: common/silverblue-modules.yml
  - from-file: common/desktop-modules.yml
  - from-file: common/proprietary-modules.yml
  - from-file: common/selinux-modules.yml
  - from-file: common/final-modules.yml
  - from-file: common/nvidia-install.yml
  - from-file: common/final-modules.yml