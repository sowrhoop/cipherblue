name: sericea-main-hardened

description: "Sericea, hardened"

base-image: quay.io/fedora-ostree-desktops/sway-atomic

image-version: 43

cosign-version: none
nushell-version: none

platforms:
  - linux/amd64
  - linux/arm64

modules:
  - from-file: common/common-modules.yml
  - from-file: common/sericea-modules.yml
  - from-file: common/desktop-modules.yml
  - from-file: common/proprietary-modules.yml
  - from-file: common/final-modules.yml
